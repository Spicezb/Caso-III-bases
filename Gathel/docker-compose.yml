services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: gathel_sqlserver
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Gathel123!"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - gathel_sqlserver_data:/var/opt/mssql
    networks:
      - gathel_network
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Gathel123!" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  flyway:
    image: flyway/flyway:latest
    container_name: gathel_flyway
    depends_on:
      sqlserver:
        condition: service_healthy
    volumes:
      - ./flyway/sql:/flyway/sql
      - ./flyway/conf:/flyway/conf
    command: -configFiles=/flyway/conf/flyway.conf migrate
    networks:
      - gathel_network

  backend:
    build:
      context: ./backend/Gathel.Api
      dockerfile: Dockerfile
    container_name: gathel_backend
    depends_on:
      sqlserver:
        condition: service_healthy
      flyway:
        condition: service_completed_successfully
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:5145
      ConnectionStrings__GathelDb: "Server=sqlserver,1433;Database=GathelDB;User Id=sa;Password=Gathel123!;TrustServerCertificate=True;Encrypt=True;Min Pool Size=10;Max Pool Size=10"
    ports:
      - "5145:5145"
    networks:
      - gathel_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:5145
    container_name: gathel_frontend
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5145
    ports:
      - "3000:3000"
    networks:
      - gathel_network

volumes:
  gathel_sqlserver_data:

networks:
  gathel_network: